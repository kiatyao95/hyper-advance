name: Deploy v4 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v4/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix v4

      - name: Build v4 for GitHub Pages
        run: npm run build --prefix v4
        env:
          GITHUB_PAGES: true

      - name: Add SPA fallback for GitHub Pages
        run: cp v4/dist/index.html v4/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: v4/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
