name: Deploy v4 to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v4/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix v4

      - name: Build v4 for GitHub Pages
        run: npm run build --prefix v4
        env:
          GITHUB_PAGES: true
          BASE_PATH: /hyper-advance/docs/

      - name: Add SPA fallback for GitHub Pages
        run: |
          cp v4/dist/index.html v4/dist/404.html
          touch v4/dist/.nojekyll

      - name: Publish built site to docs/
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: main
          folder: v4/dist
          target-folder: docs
          clean: true
          single-commit: true
          commit-message: Deploy v4 site to docs/
